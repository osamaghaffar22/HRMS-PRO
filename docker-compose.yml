version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hrms_postgres
    restart: always
    environment:
      - POSTGRES_USER=hrms_user
      - POSTGRES_PASSWORD=hrms_password
      - POSTGRES_DB=hrms_enterprise
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://hrms_user:hrms_password@db:5432/hrms_enterprise
      - PG_DATABASE_URL=postgresql://hrms_user:hrms_password@db:5432/hrms_enterprise
      - SECRET_KEY=yoursecretkeyhere_change_it_in_production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=480
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrms_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
